<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF7043">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>未来アルバム</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #FF7043;
      --primary-dark: #E64A19;
      --primary-light: #FFF3EE;
      --bg: #FFF8F0;
      --surface: #FFFFFF;
      --text: #3E2723;
      --text-sub: #8D6E63;
      --border: #F3E5DC;
      --success: #66BB6A;
      --danger: #EF5350;
      --shadow: 0 2px 10px rgba(62, 39, 35, 0.09);
      --radius: 16px;
      --nav-h: 64px;
      --header-h: 56px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans',
                   'Yu Gothic UI', 'Meiryo', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ---- Header ---- */
    header {
      height: var(--header-h);
      background: var(--surface);
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }

    .header-icon {
      font-size: 24px;
    }

    header h1 {
      font-size: 19px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.3px;
    }

    .header-sub {
      font-size: 11px;
      color: var(--text-sub);
      margin-left: auto;
    }

    /* ---- Main ---- */
    main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .tab-panel {
      display: none;
      padding: 16px 16px 80px;
      min-height: 100%;
    }

    .tab-panel.active {
      display: block;
    }

    /* ---- Bottom Nav ---- */
    nav {
      height: var(--nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
      font-family: inherit;
    }

    .nav-btn .ni {
      font-size: 22px;
      line-height: 1;
    }

    .nav-btn.active {
      color: var(--primary);
      font-weight: 700;
    }

    /* ---- FAB ---- */
    #fab {
      position: fixed;
      bottom: calc(var(--nav-h) + 16px);
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 30px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(255, 112, 67, 0.55);
      cursor: pointer;
      z-index: 10;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #fab:active {
      transform: scale(0.90);
      box-shadow: 0 2px 8px rgba(255, 112, 67, 0.4);
    }

    /* ---- Section header ---- */
    .section-head {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-head__label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-sub);
    }

    .badge {
      margin-left: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      background: var(--primary);
      color: white;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }

    /* ---- Mission card ---- */
    .mission-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .m-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
    }

    .m-card__title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      padding-right: 32px;
    }

    .m-card__memo {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .m-card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .m-card__date {
      font-size: 11px;
      color: var(--text-sub);
    }

    .btn-done {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-done:active {
      background: var(--primary-dark);
    }

    .m-card__del {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #BCAAA4;
      padding: 2px;
      line-height: 1;
    }

    /* ---- Empty state ---- */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px;
      text-align: center;
      gap: 10px;
    }

    .empty__icon { font-size: 60px; }

    .empty__title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .empty__sub {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.65;
    }

    /* ---- Album grid ---- */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .a-card {
      position: relative;
      aspect-ratio: 1;
      border-radius: 14px;
      overflow: hidden;
      background: var(--border);
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.15s;
    }

    .a-card:active {
      transform: scale(0.96);
    }

    .a-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .a-card__no-photo {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: linear-gradient(135deg, #FFE0B2 0%, #FFCCBC 100%);
    }

    .a-card__overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(30, 10, 5, 0.72));
      padding: 24px 8px 8px;
      color: white;
    }

    .a-card__overlay-title {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
    }

    .a-card__overlay-date {
      font-size: 10px;
      opacity: 0.75;
      margin-top: 2px;
    }

    /* ---- Modal overlay ---- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.48);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ---- Bottom sheet ---- */
    .sheet {
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      padding: 12px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .overlay.open .sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 38px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .sheet-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 20px;
    }

    /* ---- Form ---- */
    .fg {
      margin-bottom: 16px;
    }

    .fg label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .fg input, .fg textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s;
      appearance: none;
    }

    .fg input:focus, .fg textarea:focus {
      border-color: var(--primary);
      background: #FFFCFA;
    }

    .fg textarea {
      resize: none;
      height: 84px;
      line-height: 1.5;
    }

    /* ---- Photo upload ---- */
    .photo-area {
      width: 100%;
      aspect-ratio: 4 / 3;
      border: 2px dashed var(--border);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      transition: border-color 0.18s;
    }

    .photo-area:active {
      border-color: var(--primary);
    }

    .photo-area .pa-icon {
      font-size: 34px;
    }

    .photo-area .pa-text {
      font-size: 13px;
      color: var(--text-sub);
    }

    .photo-area .pa-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .photo-area .pa-change {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.58);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: none;
    }

    .photo-area.has-photo .pa-icon,
    .photo-area.has-photo .pa-text {
      display: none;
    }

    .photo-area.has-photo .pa-preview {
      display: block;
    }

    .photo-area.has-photo .pa-change {
      display: block;
    }

    /* ---- Submit button ---- */
    .btn-submit {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 17px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      margin-top: 6px;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.3px;
    }

    .btn-submit:active {
      background: var(--primary-dark);
    }

    .btn-submit:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ---- Detail (full-screen) ---- */
    #detail {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      display: flex;
      flex-direction: column;
      max-width: 430px;
      margin: 0 auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    #detail.open {
      transform: translateY(0);
    }

    .detail-hd {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-back {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text);
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .detail-hd__title {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-del {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--danger);
      padding: 4px;
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .detail-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }

    .detail-no-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, #FFE0B2 0%, #FFCCBC 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    .detail-content {
      padding: 20px 20px 40px;
    }

    .detail-badge {
      display: inline-block;
      background: var(--success);
      color: white;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .detail-content__title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .detail-content__memo {
      font-size: 15px;
      color: var(--text-sub);
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .detail-dates {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 16px;
    }

    .detail-dates span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .detail-photo-memo {
      background: var(--primary-light);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text);
      line-height: 1.65;
      border-left: 3px solid var(--primary);
    }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="app">

  <header>
    <span class="header-icon">📸</span>
    <h1>未来アルバム</h1>
    <span class="header-sub">家族との思い出</span>
  </header>

  <main>
    <!-- Mission tab -->
    <div id="tab-mission" class="tab-panel active">
      <div class="section-head">
        <span class="section-head__label">ミッション</span>
        <span class="badge" id="mission-badge">0</span>
      </div>
      <div class="mission-list" id="mission-list"></div>
    </div>

    <!-- Album tab -->
    <div id="tab-album" class="tab-panel">
      <div class="section-head">
        <span class="section-head__label">アルバム</span>
        <span class="badge" id="album-badge">0</span>
      </div>
      <div class="album-grid" id="album-grid"></div>
    </div>
  </main>

  <nav>
    <button class="nav-btn active" id="nav-mission" onclick="switchTab('mission')">
      <span class="ni">🎯</span>
      ミッション
    </button>
    <button class="nav-btn" id="nav-album" onclick="switchTab('album')">
      <span class="ni">📷</span>
      アルバム
    </button>
  </nav>

  <button id="fab" onclick="openAdd()">＋</button>
</div>

<!-- Add modal -->
<div class="overlay" id="add-overlay" onclick="overlayTap(event,'add-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">新しいミッションを追加</div>
    <div class="fg">
      <label for="inp-title">タイトル</label>
      <input id="inp-title" type="text" placeholder="例：温泉旅行に一緒に行く" maxlength="50">
    </div>
    <div class="fg">
      <label for="inp-memo">メモ（任意）</label>
      <textarea id="inp-memo" placeholder="どんな思い出にしたいか書いてみよう"></textarea>
    </div>
    <button class="btn-submit" onclick="submitAdd()">追加する</button>
  </div>
</div>

<!-- Complete modal -->
<div class="overlay" id="done-overlay" onclick="overlayTap(event,'done-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🎉 ミッション達成！</div>
    <div class="fg">
      <label>写真（任意）</label>
      <div class="photo-area" id="photo-area" onclick="pickPhoto()">
        <span class="pa-icon">📷</span>
        <span class="pa-text">タップして写真を選ぶ</span>
        <img class="pa-preview" id="pa-preview" alt="">
        <button class="pa-change" onclick="event.stopPropagation();pickPhoto()">写真を変更</button>
      </div>
      <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="onPhoto(event)">
    </div>
    <div class="fg">
      <label for="inp-pm">達成のひとこと（任意）</label>
      <textarea id="inp-pm" placeholder="達成してみてどうでしたか？"></textarea>
    </div>
    <button class="btn-submit" onclick="submitDone()">アルバムに残す</button>
  </div>
</div>

<!-- Detail -->
<div id="detail">
  <div class="detail-hd">
    <button class="btn-back" onclick="closeDetail()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <span class="detail-hd__title" id="detail-title"></span>
    <button class="btn-del" onclick="deleteMission(currentDetailId)" title="削除">🗑</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
// ---- Storage ----
const KEY = 'future-album-v1';

const db = {
  load: () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } },
  save: (d) => localStorage.setItem(KEY, JSON.stringify(d))
};

// ---- Utils ----
const esc = (s) => String(s ?? '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const fmtDate = (iso) => {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
};

const isoToday = () => new Date().toISOString().split('T')[0];

const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

// ---- State ----
let tab = 'mission';
let pendingId = null;
let pendingPhoto = null;
let currentDetailId = null;

// ---- Tab ----
function switchTab(t) {
  tab = t;
  ['mission','album'].forEach(x => {
    document.getElementById('tab-' + x).classList.toggle('active', x === t);
    document.getElementById('nav-' + x).classList.toggle('active', x === t);
  });
  document.getElementById('fab').style.display = t === 'mission' ? 'flex' : 'none';
  render();
}

// ---- Render ----
function render() {
  tab === 'mission' ? renderMissions() : renderAlbum();
}

function renderMissions() {
  const all = db.load();
  const list = all.filter(m => !m.completed);
  document.getElementById('mission-badge').textContent = list.length;
  const el = document.getElementById('mission-list');

  if (!list.length) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty__icon">🌱</div>
        <div class="empty__title">ミッションを追加しよう</div>
        <div class="empty__sub">家族と叶えたい<br>思い出を登録してみましょう。</div>
      </div>`;
    return;
  }

  el.innerHTML = list.map(m => `
    <div class="m-card">
      <div class="m-card__title">${esc(m.title)}</div>
      ${m.memo ? `<div class="m-card__memo">${esc(m.memo)}</div>` : ''}
      <div class="m-card__footer">
        <span class="m-card__date">${fmtDate(m.createdAt)}</span>
        <button class="btn-done" onclick="openDone('${m.id}')">達成する ✓</button>
      </div>
      <button class="m-card__del" onclick="confirmDelete('${m.id}')" title="削除">✕</button>
    </div>
  `).join('');
}

function renderAlbum() {
  const all = db.load();
  const done = all.filter(m => m.completed);
  document.getElementById('album-badge').textContent = done.length;
  const el = document.getElementById('album-grid');

  if (!done.length) {
    el.innerHTML = `
      <div class="empty" style="grid-column:1/-1;">
        <div class="empty__icon">📷</div>
        <div class="empty__title">まだ思い出がありません</div>
        <div class="empty__sub">ミッションを達成すると<br>ここに写真が並びます。</div>
      </div>`;
    return;
  }

  el.innerHTML = done.map(m => `
    <div class="a-card" onclick="openDetail('${m.id}')">
      ${m.photo
        ? `<img src="${m.photo}" alt="${esc(m.title)}" loading="lazy">`
        : `<div class="a-card__no-photo">🌸</div>`}
      <div class="a-card__overlay">
        <div class="a-card__overlay-title">${esc(m.title)}</div>
        <div class="a-card__overlay-date">${fmtDate(m.completedAt)}</div>
      </div>
    </div>
  `).join('');
}

// ---- Add ----
function openAdd() {
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-memo').value = '';
  openOverlay('add-overlay');
  setTimeout(() => document.getElementById('inp-title').focus(), 320);
}

function submitAdd() {
  const title = document.getElementById('inp-title').value.trim();
  if (!title) { document.getElementById('inp-title').focus(); return; }
  const memo = document.getElementById('inp-memo').value.trim();
  const all = db.load();
  all.unshift({ id: genId(), title, memo, createdAt: isoToday(), completed: false, completedAt: null, photo: null, photoMemo: '' });
  db.save(all);
  closeOverlay('add-overlay');
  render();
}

// ---- Complete ----
function openDone(id) {
  pendingId = id;
  pendingPhoto = null;
  const area = document.getElementById('photo-area');
  area.classList.remove('has-photo');
  document.getElementById('pa-preview').src = '';
  document.getElementById('inp-pm').value = '';
  document.getElementById('photo-input').value = '';
  openOverlay('done-overlay');
}

function pickPhoto() {
  document.getElementById('photo-input').click();
}

function onPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    compressImage(ev.target.result, 1080, 0.75).then(data => {
      pendingPhoto = data;
      document.getElementById('pa-preview').src = data;
      document.getElementById('photo-area').classList.add('has-photo');
    });
  };
  reader.readAsDataURL(file);
}

function compressImage(src, maxW, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = src;
  });
}

function submitDone() {
  if (!pendingId) return;
  const photoMemo = document.getElementById('inp-pm').value.trim();
  const all = db.load();
  const m = all.find(x => x.id === pendingId);
  if (m) {
    m.completed = true;
    m.completedAt = isoToday();
    m.photo = pendingPhoto;
    m.photoMemo = photoMemo;
  }
  db.save(all);
  closeOverlay('done-overlay');
  switchTab('album');
}

// ---- Detail ----
function openDetail(id) {
  const m = db.load().find(x => x.id === id);
  if (!m) return;
  currentDetailId = id;
  document.getElementById('detail-title').textContent = m.title;
  document.getElementById('detail-body').innerHTML = `
    ${m.photo
      ? `<img class="detail-photo" src="${m.photo}" alt="${esc(m.title)}">`
      : `<div class="detail-no-photo">🌸</div>`}
    <div class="detail-content">
      <span class="detail-badge">✓ 達成済み</span>
      <div class="detail-content__title">${esc(m.title)}</div>
      ${m.memo ? `<div class="detail-content__memo">${esc(m.memo)}</div>` : ''}
      <div class="detail-dates">
        <span>📅 登録：${fmtDate(m.createdAt)}</span>
        <span>🎉 達成：${fmtDate(m.completedAt)}</span>
      </div>
      ${m.photoMemo ? `<div class="detail-photo-memo">💬 ${esc(m.photoMemo)}</div>` : ''}
    </div>
  `;
  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  currentDetailId = null;
}

function deleteMission(id) {
  if (!id) return;
  if (!confirm('このミッションを削除しますか？')) return;
  db.save(db.load().filter(m => m.id !== id));
  closeDetail();
  render();
}

function confirmDelete(id) {
  if (!confirm('このミッションを削除しますか？')) return;
  db.save(db.load().filter(m => m.id !== id));
  render();
}

// ---- Overlay helpers ----
function openOverlay(id) { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

function overlayTap(e, id) {
  if (e.target === document.getElementById(id)) closeOverlay(id);
}

// ---- Enter key on title ----
document.getElementById('inp-title').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAdd();
});

// ---- Back gesture (Android) ----
window.addEventListener('popstate', () => {
  if (document.getElementById('detail').classList.contains('open')) closeDetail();
});

// ---- Init ----
render();
</script>
</body>
</html>
