<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF7043">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>未来アルバム</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #FF7043;
      --primary-dark: #E64A19;
      --primary-light: #FFF3EE;
      --bg: #FFF8F0;
      --surface: #FFFFFF;
      --text: #3E2723;
      --text-sub: #8D6E63;
      --border: #F3E5DC;
      --success: #66BB6A;
      --danger: #EF5350;
      --shadow: 0 2px 10px rgba(62, 39, 35, 0.09);
      --radius: 16px;
      --nav-h: 64px;
      --header-h: 56px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans',
                   'Yu Gothic UI', 'Meiryo', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ---- Header ---- */
    header {
      height: var(--header-h);
      background: var(--surface);
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }

    .header-icon {
      font-size: 24px;
    }

    header h1 {
      font-size: 19px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.3px;
    }

    .header-sub {
      font-size: 11px;
      color: var(--text-sub);
      margin-left: auto;
    }

    /* ---- Main ---- */
    main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .tab-panel {
      display: none;
      padding: 16px 16px 80px;
      min-height: 100%;
    }

    .tab-panel.active {
      display: block;
    }

    /* ---- Bottom Nav ---- */
    nav {
      height: var(--nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
      font-family: inherit;
    }

    .nav-btn .ni {
      font-size: 22px;
      line-height: 1;
    }

    .nav-btn.active {
      color: var(--primary);
      font-weight: 700;
    }

    /* ---- FAB ---- */
    #fab {
      position: fixed;
      bottom: calc(var(--nav-h) + 16px);
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 30px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(255, 112, 67, 0.55);
      cursor: pointer;
      z-index: 10;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #fab:active {
      transform: scale(0.90);
      box-shadow: 0 2px 8px rgba(255, 112, 67, 0.4);
    }

    /* ---- Section header ---- */
    .section-head {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-head__label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-sub);
    }

    .badge {
      margin-left: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      background: var(--primary);
      color: white;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }

    /* ---- Mission card ---- */
    .mission-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .m-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
    }

    .m-card__title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      padding-right: 32px;
    }

    .m-card__memo {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .m-card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .m-card__date {
      font-size: 11px;
      color: var(--text-sub);
    }

    .btn-done {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-done:active {
      background: var(--primary-dark);
    }

    .m-card__del {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #BCAAA4;
      padding: 2px;
      line-height: 1;
    }

    /* ---- Empty state ---- */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px;
      text-align: center;
      gap: 10px;
    }

    .empty__icon { font-size: 60px; }

    .empty__title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .empty__sub {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.65;
    }

    /* ---- Album grid ---- */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .a-card {
      position: relative;
      aspect-ratio: 1;
      border-radius: 14px;
      overflow: hidden;
      background: var(--border);
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.15s;
    }

    .a-card:active {
      transform: scale(0.96);
    }

    .a-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .a-card__no-photo {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: linear-gradient(135deg, #FFE0B2 0%, #FFCCBC 100%);
    }

    .a-card__overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(30, 10, 5, 0.72));
      padding: 24px 8px 8px;
      color: white;
    }

    .a-card__overlay-title {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
    }

    .a-card__overlay-date {
      font-size: 10px;
      opacity: 0.75;
      margin-top: 2px;
    }

    /* ---- Modal overlay ---- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.48);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ---- Bottom sheet ---- */
    .sheet {
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      padding: 12px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .overlay.open .sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 38px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .sheet-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 20px;
    }

    /* ---- Form ---- */
    .fg {
      margin-bottom: 16px;
    }

    .fg label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .fg input, .fg textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s;
      appearance: none;
    }

    .fg input:focus, .fg textarea:focus {
      border-color: var(--primary);
      background: #FFFCFA;
    }

    .fg textarea {
      resize: none;
      height: 84px;
      line-height: 1.5;
    }

    /* ---- Photo upload ---- */
    .photo-area {
      width: 100%;
      aspect-ratio: 4 / 3;
      border: 2px dashed var(--border);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      transition: border-color 0.18s;
    }

    .photo-area:active {
      border-color: var(--primary);
    }

    .photo-area .pa-icon {
      font-size: 34px;
    }

    .photo-area .pa-text {
      font-size: 13px;
      color: var(--text-sub);
    }

    .photo-area .pa-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .photo-area .pa-change {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.58);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: none;
    }

    .photo-area.has-photo .pa-icon,
    .photo-area.has-photo .pa-text {
      display: none;
    }

    .photo-area.has-photo .pa-preview {
      display: block;
    }

    .photo-area.has-photo .pa-change {
      display: block;
    }

    /* ---- Submit button ---- */
    .btn-submit {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 17px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      margin-top: 6px;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.3px;
    }

    .btn-submit:active {
      background: var(--primary-dark);
    }

    .btn-submit:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ---- Detail (full-screen) ---- */
    #detail {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      display: flex;
      flex-direction: column;
      max-width: 430px;
      margin: 0 auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    #detail.open {
      transform: translateY(0);
    }

    .detail-hd {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-back {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text);
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .detail-hd__title {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-del {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--danger);
      padding: 4px;
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .detail-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }

    .detail-no-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, #FFE0B2 0%, #FFCCBC 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    .detail-content {
      padding: 20px 20px 40px;
    }

    .detail-badge {
      display: inline-block;
      background: var(--success);
      color: white;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .detail-content__title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .detail-content__memo {
      font-size: 15px;
      color: var(--text-sub);
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .detail-dates {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 16px;
    }

    .detail-dates span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .detail-photo-memo {
      background: var(--primary-light);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text);
      line-height: 1.65;
      border-left: 3px solid var(--primary);
    }

    /* ---- Person chips ---- */
    .person-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 9px 18px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--bg);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-sub);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      font-family: inherit;
    }

    .chip.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }

    .person-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 12px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .person-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    /* ---- Detail photo edit affordance ---- */
    .detail-photo-wrap {
      position: relative;
      cursor: pointer;
    }

    .detail-photo-edit-btn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.58);
      color: white;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
    }

    .detail-photo-add-btn {
      margin-top: 14px;
      display: inline-block;
      background: rgba(255, 112, 67, 0.12);
      color: var(--primary);
      border-radius: 20px;
      padding: 10px 22px;
      font-size: 15px;
      font-weight: 700;
    }

    /* ---- Slot Machine ---- */
    .slot-machine {
      background: linear-gradient(160deg, #E64A19 0%, var(--primary) 55%, #FF8A65 100%);
      border-radius: var(--radius);
      padding: 14px 14px 18px;
      margin-bottom: 20px;
    }

    .slot-machine__top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .slot-machine__label {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.8px;
    }

    .slot-machine__hint {
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      max-width: 180px;
      text-align: right;
      line-height: 1.3;
    }

    .slot-cols {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .slot-col-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .slot-col-wrap.wide { flex: 1.5; }

    .slot-col-label {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.5px;
    }

    .slot-viewport {
      height: 156px;
      overflow: hidden;
      position: relative;
      border-radius: 10px;
      background: rgba(0,0,0,0.22);
      cursor: pointer;
      transition: background 0.25s;
    }

    .slot-viewport.stopped {
      background: rgba(255,255,255,0.18);
    }

    .slot-viewport::before,
    .slot-viewport::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 52px;
      pointer-events: none;
      z-index: 2;
    }

    .slot-viewport::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
    }

    .slot-viewport::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
    }

    .slot-track {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      will-change: transform;
    }

    .slot-item {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      text-align: center;
      line-height: 1.25;
      padding: 0 4px;
    }

    .slot-highlight {
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      height: 52px;
      border-top: 1.5px solid rgba(255,255,255,0.45);
      border-bottom: 1.5px solid rgba(255,255,255,0.45);
      pointer-events: none;
      z-index: 1;
    }

    .slot-machine__actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-slot-start {
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.5);
      color: white;
      border-radius: 20px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-slot-start:active { background: rgba(255,255,255,0.35); }

    .btn-add-spin {
      background: white;
      border: none;
      color: var(--primary);
      border-radius: 20px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn-add-spin:active { opacity: 0.75; }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="app">

  <header>
    <span class="header-icon">📸</span>
    <h1>未来アルバム</h1>
    <span class="header-sub">親との時間を、今日作ろう</span>
  </header>

  <main>
    <!-- Mission tab -->
    <div id="tab-mission" class="tab-panel active">
      <div class="slot-machine">
        <div class="slot-machine__top">
          <span class="slot-machine__label">今日のミッション</span>
          <span class="slot-machine__hint" id="slot-hint">スタートを押して始めよう</span>
        </div>
        <div class="slot-cols">
          <div class="slot-col-wrap">
            <div class="slot-col-label">場所</div>
            <div class="slot-viewport" id="sv-0" onclick="stopSlot(0)">
              <div class="slot-track" id="st-0"></div>
              <div class="slot-highlight"></div>
            </div>
          </div>
          <div class="slot-col-wrap">
            <div class="slot-col-label">行動</div>
            <div class="slot-viewport" id="sv-1" onclick="stopSlot(1)">
              <div class="slot-track" id="st-1"></div>
              <div class="slot-highlight"></div>
            </div>
          </div>
          <div class="slot-col-wrap wide">
            <div class="slot-col-label">内容</div>
            <div class="slot-viewport" id="sv-2" onclick="stopSlot(2)">
              <div class="slot-track" id="st-2"></div>
              <div class="slot-highlight"></div>
            </div>
          </div>
        </div>
        <div class="slot-machine__actions">
          <button class="btn-slot-start" onclick="startSlots()">▶ スタート</button>
          <button class="btn-add-spin" id="btn-add-spin" onclick="addFromSlot()" style="display:none">このミッションを追加</button>
        </div>
      </div>
      <div class="section-head">
        <span class="section-head__label">ミッション一覧</span>
        <span class="badge" id="mission-badge">0</span>
      </div>
      <div class="mission-list" id="mission-list"></div>
    </div>

    <!-- Album tab -->
    <div id="tab-album" class="tab-panel">
      <div class="section-head">
        <span class="section-head__label">アルバム</span>
        <span class="badge" id="album-badge">0</span>
      </div>
      <div class="album-grid" id="album-grid"></div>
    </div>
  </main>

  <nav>
    <button class="nav-btn active" id="nav-mission" onclick="switchTab('mission')">
      <span class="ni">🎯</span>
      ミッション
    </button>
    <button class="nav-btn" id="nav-album" onclick="switchTab('album')">
      <span class="ni">📷</span>
      アルバム
    </button>
  </nav>

  <button id="fab" onclick="openAdd()">＋</button>
</div>

<!-- Add modal -->
<div class="overlay" id="add-overlay" onclick="overlayTap(event,'add-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">新しいミッションを追加</div>
    <div class="fg">
      <label for="inp-title">タイトル</label>

    </div>
    <div class="fg">

</div>

<!-- Complete modal -->
<div class="overlay" id="done-overlay" onclick="overlayTap(event,'done-overlay')">
  <div class="sheet">

        <span class="pa-text">タップして写真を選ぶ</span>
        <img class="pa-preview" id="pa-preview" alt="">
        <button class="pa-change" onclick="event.stopPropagation();pickPhoto()">写真を変更</button>

      <div class="person-chips" id="done-persons">

        <button class="chip" data-person="母" onclick="toggleChip(this)">母</button>
        <button class="chip" data-person="両親" onclick="toggleChip(this)">両親</button>
        <button class="chip" data-person="祖父" onclick="toggleChip(this)">祖父</button>
        <button class="chip" data-person="祖母" onclick="toggleChip(this)">祖母</button>
      </div>
    </div>
    <div class="fg">
      <label for="inp-pm">達成のひとこと（任意）</label>

<!-- Edit photo overlay -->
<div class="overlay" id="ep-overlay" onclick="overlayTap(event,'ep-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📷 写真を編集</div>
    <div class="fg">
      <label>写真</label>
      <div class="photo-area" id="ep-area" onclick="pickEditPhoto()">
        <span class="pa-icon">📷</span>
        <span class="pa-text">タップして写真を選ぶ</span>
        <img class="pa-preview" id="ep-preview" alt="">
        <button class="pa-change" onclick="event.stopPropagation();pickEditPhoto()">写真を変更</button>
      </div>
      <input type="file" id="ep-input" accept="image/*" style="display:none" onchange="onEditPhoto(event)">
    </div>
    <div class="fg">
      <label>誰が写っていますか？（任意）</label>
      <div class="person-chips" id="ep-persons">

        <button class="chip" data-person="母" onclick="toggleChip(this)">母</button>
        <button class="chip" data-person="両親" onclick="toggleChip(this)">両親</button>
        <button class="chip" data-person="祖父" onclick="toggleChip(this)">祖父</button>

<!-- Detail -->
<div id="detail">
  <div class="detail-hd">
    <button class="btn-back" onclick="closeDetail()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <span class="detail-hd__title" id="detail-title"></span>
    <button class="btn-del" onclick="deleteMission(currentDetailId)" title="削除">🗑</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
// ---- Slot Machine ----
const SLOT_DEFS = [
  { items: ['キッチン', 'リビング', '寝室', '玄関'] },
  { items: ['話す', '手伝う'] },
  { items: ['学生の頃の話', '仕事の話', 'お小遣いの話', '親の話'] },
];

const SLOT_H = 52;   // item height px
const SLOT_COPIES = 4;

const slotState = SLOT_DEFS.map((_, i) => ({
  count: SLOT_DEFS[i].items.length,
  offsetY: 0,
  spinning: false,
  stopped: false,
  selected: 0,
  raf: null,
  speed: 2.8 + i * 0.3,
}));

let slotAllStopped = false;

function initSlots() {
  SLOT_DEFS.forEach((def, i) => {
    const track = document.getElementById('st-' + i);
    const s = slotState[i];
    const repeated = Array.from({length: SLOT_COPIES}, () => def.items).flat();
    track.innerHTML = repeated.map(item =>
      `<div class="slot-item">${esc(item)}</div>`
    ).join('');
    // item[0] at center of viewport initially
    s.offsetY = SLOT_H - s.count * SLOT_H;
    track.style.transform = `translateY(${s.offsetY}px)`;
  });
}

function startSlots() {
  slotAllStopped = false;
  document.getElementById('btn-add-spin').style.display = 'none';
  document.getElementById('slot-hint').textContent = 'タップして止める';
  slotState.forEach((s, i) => {
    if (s.raf) cancelAnimationFrame(s.raf);
    s.stopped = false;
    s.spinning = true;
    document.getElementById('sv-' + i).classList.remove('stopped');
    animateSlot(i);
  });
}

function animateSlot(i) {
  const s = slotState[i];
  const track = document.getElementById('st-' + i);
  const totalH = s.count * SLOT_H;
  function tick() {
    s.offsetY += s.speed;
    if (s.offsetY >= 0) s.offsetY -= totalH;
    track.style.transform = `translateY(${s.offsetY}px)`;
    if (s.spinning) s.raf = requestAnimationFrame(tick);
  }
  tick();
}

function stopSlot(i) {
  const s = slotState[i];
  if (!s.spinning || s.stopped) return;
  s.spinning = false;
  cancelAnimationFrame(s.raf);

  const track = document.getElementById('st-' + i);
  const totalH = s.count * SLOT_H;
  let spd = s.speed;

  function decel() {
    spd *= 0.87;
    s.offsetY += spd;
    if (s.offsetY >= 0) s.offsetY -= totalH;
    track.style.transform = `translateY(${s.offsetY}px)`;
    if (spd > 0.4) {
      s.raf = requestAnimationFrame(decel);
    } else {
      // snap to nearest item at center (y = SLOT_H)
      const p = Math.round((SLOT_H - s.offsetY) / SLOT_H);
      let snap = SLOT_H - p * SLOT_H;
      while (snap > 0)      snap -= totalH;
      while (snap <= -totalH) snap += totalH;
      s.offsetY = snap;
      track.style.transform = `translateY(${snap}px)`;
      s.selected = ((p % s.count) + s.count) % s.count;
      s.stopped = true;
      document.getElementById('sv-' + i).classList.add('stopped');
      checkAllStopped();
    }
  }
  decel();
}

function checkAllStopped() {
  const remaining = slotState.filter(s => !s.stopped).length;
  if (remaining > 0) {
    document.getElementById('slot-hint').textContent = `あと${remaining}つタップして止める`;
    return;
  }
  slotAllStopped = true;
  const place  = SLOT_DEFS[0].items[slotState[0].selected];
  const action = SLOT_DEFS[1].items[slotState[1].selected];
  const content= SLOT_DEFS[2].items[slotState[2].selected];
  document.getElementById('slot-hint').textContent = `${place}で${action}（${content}）`;
  document.getElementById('btn-add-spin').style.display = 'block';
}

function addFromSlot() {
  if (!slotAllStopped) return;
  const place  = SLOT_DEFS[0].items[slotState[0].selected];
  const action = SLOT_DEFS[1].items[slotState[1].selected];
  const content= SLOT_DEFS[2].items[slotState[2].selected];
  const all = db.load();
  all.unshift({ id: genId(), title: `${place}で${action}（${content}）`, memo: '', createdAt: isoToday(), completed: false, completedAt: null, photo: null, photoMemo: '', persons: [] });
  db.save(all);
  slotAllStopped = false;
  document.getElementById('btn-add-spin').style.display = 'none';
  document.getElementById('slot-hint').textContent = 'スタートを押して始めよう';
  render();
}

// ---- Storage ----
const KEY = 'future-album-v1';

const db = {
  load: () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } },
  save: (d) => localStorage.setItem(KEY, JSON.stringify(d))
};

// ---- Utils ----
const esc = (s) => String(s ?? '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const fmtDate = (iso) => {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
};

const isoToday = () => new Date().toISOString().split('T')[0];

const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

// ---- State ----
let tab = 'mission';
let pendingId = null;
let pendingPhoto = null;
let currentDetailId = null;

// ---- Tab ----
function switchTab(t) {
  tab = t;
  ['mission','album'].forEach(x => {
    document.getElementById('tab-' + x).classList.toggle('active', x === t);
    document.getElementById('nav-' + x).classList.toggle('active', x === t);
  });
  document.getElementById('fab').style.display = t === 'mission' ? 'flex' : 'none';
  render();
}

// ---- Render ----
function render() {
  tab === 'mission' ? renderMissions() : renderAlbum();
}

function renderMissions() {
  const all = db.load();
  const list = all.filter(m => !m.completed);
  document.getElementById('mission-badge').textContent = list.length;
  const el = document.getElementById('mission-list');

  if (!list.length) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty__icon">🌱</div>
        <div class="empty__title">今日やることを決めよう</div>
        <div class="empty__sub">ルーレットを回すか、<br>「＋」で自分でミッションを追加しよう。</div>
      </div>`;
    return;
  }

  el.innerHTML = list.map(m => `
    <div class="m-card">
      <div class="m-card__title">${esc(m.title)}</div>
      ${m.memo ? `<div class="m-card__memo">${esc(m.memo)}</div>` : ''}
      <div class="m-card__footer">
        <span class="m-card__date">${fmtDate(m.createdAt)}</span>
        <button class="btn-done" onclick="openDone('${m.id}')">達成する ✓</button>
      </div>
      <button class="m-card__del" onclick="confirmDelete('${m.id}')" title="削除">✕</button>
    </div>
  `).join('');
}

function renderAlbum() {
  const all = db.load();
  const done = all.filter(m => m.completed);
  document.getElementById('album-badge').textContent = done.length;
  const el = document.getElementById('album-grid');

  if (!done.length) {
    el.innerHTML = `
      <div class="empty" style="grid-column:1/-1;">
        <div class="empty__icon">📷</div>
        <div class="empty__title">まだ思い出がありません</div>
        <div class="empty__sub">ミッションを達成すると<br>親との思い出がここに残ります。</div>
      </div>`;
    return;
  }

  el.innerHTML = done.map(m => `
    <div class="a-card" onclick="openDetail('${m.id}')">
      ${m.photo
        ? `<img src="${m.photo}" alt="${esc(m.title)}" loading="lazy">`
        : `<div class="a-card__no-photo">🌸</div>`}
      <div class="a-card__overlay">
        <div class="a-card__overlay-title">${esc(m.title)}</div>
        <div class="a-card__overlay-date">${fmtDate(m.completedAt)}</div>
      </div>
    </div>
  `).join('');
}

// ---- Add ----
function openAdd() {
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-memo').value = '';
  openOverlay('add-overlay');
  setTimeout(() => document.getElementById('inp-title').focus(), 320);
}

function submitAdd() {
  const title = document.getElementById('inp-title').value.trim();
  if (!title) { document.getElementById('inp-title').focus(); return; }
  const memo = document.getElementById('inp-memo').value.trim();
  const all = db.load();
  all.unshift({ id: genId(), title, memo, createdAt: isoToday(), completed: false, completedAt: null, photo: null, photoMemo: '', persons: [] });
  db.save(all);
  closeOverlay('add-overlay');
  render();
}

// ---- Complete ----
function openDone(id) {
  pendingId = id;
  pendingPhoto = null;
  resetChips('done-persons');
  const area = document.getElementById('photo-area');
  area.classList.remove('has-photo');
  document.getElementById('pa-preview').src = '';
  document.getElementById('inp-pm').value = '';
  document.getElementById('photo-input').value = '';
  openOverlay('done-overlay');
}

function pickPhoto() {
  document.getElementById('photo-input').click();
}

function onPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    compressImage(ev.target.result, 1080, 0.75).then(data => {
      pendingPhoto = data;
      document.getElementById('pa-preview').src = data;
      document.getElementById('photo-area').classList.add('has-photo');
    });
  };
  reader.readAsDataURL(file);
}

function compressImage(src, maxW, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = src;
  });
}

function submitDone() {
  if (!pendingId) return;
  const photoMemo = document.getElementById('inp-pm').value.trim();
  const all = db.load();
  const m = all.find(x => x.id === pendingId);
  if (m) {
    m.completed = true;
    m.completedAt = isoToday();
    m.photo = pendingPhoto;
    m.photoMemo = photoMemo;
    m.persons = getSelectedChips('done-persons');
  }
  db.save(all);
  closeOverlay('done-overlay');
  switchTab('album');
}

// ---- Person chips ----
function toggleChip(el) {
  el.classList.toggle('selected');
}

function resetChips(groupId) {
  document.querySelectorAll(`#${groupId} .chip`).forEach(c => c.classList.remove('selected'));
}

function setChips(groupId, persons) {
  resetChips(groupId);
  (persons || []).forEach(p => {
    const c = document.querySelector(`#${groupId} .chip[data-person="${p}"]`);
    if (c) c.classList.add('selected');
  });
}

function getSelectedChips(groupId) {
  return Array.from(document.querySelectorAll(`#${groupId} .chip.selected`))
    .map(el => el.dataset.person);
}

// ---- Edit Photo ----
let editPhotoId = null;
let editPhoto = null;

function openEditPhoto(id) {
  const m = db.load().find(x => x.id === id);
  if (!m) return;
  editPhotoId = id;
  editPhoto = null;
  setChips('ep-persons', m.persons);
  const area = document.getElementById('ep-area');
  const preview = document.getElementById('ep-preview');
  if (m.photo) {
    area.classList.add('has-photo');
    preview.src = m.photo;
  } else {
    area.classList.remove('has-photo');
    preview.src = '';
  }
  document.getElementById('ep-memo').value = m.photoMemo || '';
  document.getElementById('ep-input').value = '';
  openOverlay('ep-overlay');
}

function pickEditPhoto() {
  document.getElementById('ep-input').click();
}

function onEditPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    compressImage(ev.target.result, 1080, 0.75).then(data => {
      editPhoto = data;
      document.getElementById('ep-preview').src = data;
      document.getElementById('ep-area').classList.add('has-photo');
    });
  };
  reader.readAsDataURL(file);
}

function submitEditPhoto() {
  if (!editPhotoId) return;
  const memo = document.getElementById('ep-memo').value.trim();
  const all = db.load();
  const m = all.find(x => x.id === editPhotoId);
  if (m) {
    if (editPhoto !== null) m.photo = editPhoto;
    m.photoMemo = memo;
    m.persons = getSelectedChips('ep-persons');
  }
  db.save(all);
  closeOverlay('ep-overlay');
  openDetail(editPhotoId);
  if (tab === 'album') renderAlbum();
}

// ---- Detail ----
function openDetail(id) {
  const m = db.load().find(x => x.id === id);
  if (!m) return;
  currentDetailId = id;
  document.getElementById('detail-title').textContent = m.title;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-photo-wrap" onclick="openEditPhoto('${m.id}')">
      ${m.photo
        ? `<img class="detail-photo" src="${m.photo}" alt="${esc(m.title)}">
           <div class="detail-photo-edit-btn">📷 写真を変更</div>`
        : `<div class="detail-no-photo">
             <div style="text-align:center">
               <div>🌸</div>
               <div class="detail-photo-add-btn">📷 写真を追加する</div>
             </div>
           </div>`}
    </div>
    <div class="detail-content">
      <span class="detail-badge">✓ 達成済み</span>
      ${(m.persons && m.persons.length) ? `
        <div class="person-tags">
          ${m.persons.map(p => `<span class="person-tag">${esc(p)}</span>`).join('')}
        </div>` : ''}
      <div class="detail-content__title">${esc(m.title)}</div>
      ${m.memo ? `<div class="detail-content__memo">${esc(m.memo)}</div>` : ''}
      <div class="detail-dates">
        <span>📅 登録：${fmtDate(m.createdAt)}</span>
        <span>🎉 達成：${fmtDate(m.completedAt)}</span>
      </div>
      ${m.photoMemo ? `<div class="detail-photo-memo">💬 ${esc(m.photoMemo)}</div>` : ''}
    </div>
  `;
  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  currentDetailId = null;
}

function deleteMission(id) {
  if (!id) return;
  if (!confirm('このミッションを削除しますか？')) return;
  db.save(db.load().filter(m => m.id !== id));
  closeDetail();
  render();
}

function confirmDelete(id) {
  if (!confirm('このミッションを削除しますか？')) return;
  db.save(db.load().filter(m => m.id !== id));
  render();
}

// ---- Overlay helpers ----
function openOverlay(id) { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

function overlayTap(e, id) {
  if (e.target === document.getElementById(id)) closeOverlay(id);
}

// ---- Enter key on title ----
document.getElementById('inp-title').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAdd();
});

// ---- Back gesture (Android) ----
window.addEventListener('popstate', () => {
  if (document.getElementById('detail').classList.contains('open')) closeDetail();
});

// ---- Init ----
initSlots();
render();
</script>
